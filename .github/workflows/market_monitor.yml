name: 마켓봇 (5분 신호체크+속보+텔레그램)

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 (GitHub Actions 최소 단위)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4       # 5분 안에 끝나야 하므로 4분 제한

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install yfinance pandas numpy requests

      - name: 상태 복원
        uses: actions/cache@v4
        with:
          path: market_state.json
          key: market-state-${{ github.run_number }}
          restore-keys: market-state-

      - name: 마켓봇 실행
        env:
          TG_BOT_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:     ${{ secrets.TG_CHAT_ID }}
          KORU_AVG_COST:  ${{ secrets.KORU_AVG_COST }}
          PYTHONUTF8:     "1"
          PYTHONIOENCODING: "utf-8"
        run: python market_bot_gha.py

      - name: 상태 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: market_state.json
          key: market-state-${{ github.run_number }}
